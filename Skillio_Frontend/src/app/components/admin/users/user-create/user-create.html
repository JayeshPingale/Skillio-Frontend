<div class="user-create-wrapper">
  <!-- Header Section -->
  <div class="page-header">
    <div class="header-left">
      <button class="btn-back" (click)="cancel()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Back
      </button>
      <div class="header-info">
        <h1 class="page-title">Create New User</h1>
        <p class="page-subtitle">Add a new user to the system</p>
      </div>
    </div>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage()" class="error-alert">
    <svg class="error-icon" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
    </svg>
    <span>{{ errorMessage() }}</span>
  </div>

  <!-- Form Card -->
  <div class="form-card">
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
      <!-- Full Name -->
      <div class="form-group">
        <label for="fullName" class="input-label">
          <svg class="label-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Full Name
        </label>
        <input
          type="text"
          id="fullName"
          formControlName="fullName"
          class="input-field"
          placeholder="Enter full name"
          [class.error]="fullName?.invalid && fullName?.touched"
        />
        <div class="error-message" *ngIf="fullName?.invalid && fullName?.touched">
          <span *ngIf="fullName?.errors?.['required']">Full name is required</span>
          <span *ngIf="fullName?.errors?.['minlength']">Minimum 3 characters required</span>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email" class="input-label">
          <svg class="label-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
          </svg>
          Email Address
        </label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="input-field"
          placeholder="user@example.com"
          [class.error]="email?.invalid && email?.touched"
        />
        <div class="error-message" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Invalid email format</span>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password" class="input-label">
          <svg class="label-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          Password
        </label>
        <div class="password-wrapper">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            id="password"
            formControlName="password"
            class="input-field"
            placeholder="Enter password"
            [class.error]="password?.invalid && password?.touched"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility()"
          >
            <svg *ngIf="!showPassword()" class="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg *ngIf="showPassword()" class="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>
        <div class="error-message" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">Password is required</span>
          <span *ngIf="password?.errors?.['minlength']">Minimum 6 characters required</span>
        </div>
      </div>

      <!-- Contact Number -->
      <div class="form-group">
        <label for="contactNumber" class="input-label">
          <svg class="label-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
          </svg>
          Contact Number
        </label>
        <input
          type="tel"
          id="contactNumber"
          formControlName="contactNumber"
          class="input-field"
          placeholder="Enter 10-digit mobile number"
          maxlength="10"
          [class.error]="contactNumber?.invalid && contactNumber?.touched"
        />
        <div class="error-message" *ngIf="contactNumber?.invalid && contactNumber?.touched">
          <span *ngIf="contactNumber?.errors?.['required']">Contact number is required</span>
          <span *ngIf="contactNumber?.errors?.['pattern']">Enter valid 10-digit number</span>
        </div>
      </div>

      <!-- Role Selection -->
      <div class="form-group">
        <label for="roleName" class="input-label">
          <svg class="label-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
          User Role
        </label>
        <select
          id="roleName"
          formControlName="roleName"
          class="input-field"
          [class.error]="roleName?.invalid && roleName?.touched"
        >
          <option [value]="null" disabled>Select a role</option>
          <option *ngFor="let role of roles()" [value]="role.roleName">
            {{ role.roleName }} - {{ role.description }}
          </option>
        </select>
        <div class="error-message" *ngIf="roleName?.invalid && roleName?.touched">
          <span *ngIf="roleName?.errors?.['required']">Role selection is required</span>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <button
          type="button"
          class="btn-cancel"
          (click)="cancel()"
          [disabled]="isSubmitting()"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="btn-submit"
          [disabled]="isSubmitting() || userForm.invalid"
        >
          <span *ngIf="!isSubmitting()">Create User</span>
          <span *ngIf="isSubmitting()" class="loading-text">
            <span class="spinner"></span>
            Creating...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
