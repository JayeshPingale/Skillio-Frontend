<div class="role-list-wrapper">
  <!-- Header Section -->
  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title">Role Management</h1>
      <p class="page-subtitle">Manage system roles and permissions</p>
    </div>
    <div class="header-right">
      <button class="btn-create" (click)="navigateToCreate()">
        <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Create Role
      </button>
    </div>
  </div>

  <!-- Search Section -->
  <div class="filter-section">
    <div class="search-box">
      <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input
        type="text"
        placeholder="Search roles by name or description..."
        [value]="searchTerm()"
        (input)="updateSearchTerm($any($event.target).value)"
        class="search-input"
      />
    </div>
  </div>

  <!-- Success Message -->
  <div *ngIf="successMessage()" class="success-alert">
    <svg class="success-icon" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
    </svg>
    <span>{{ successMessage() }}</span>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage()" class="error-alert">
    <svg class="error-icon" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
    </svg>
    <span>{{ errorMessage() }}</span>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading()" class="loading-container">
    <div class="spinner-large"></div>
    <p class="loading-text">Loading roles...</p>
  </div>

  <!-- Roles Grid -->
  <div *ngIf="!isLoading()" class="roles-grid">
    <div *ngFor="let role of filteredRoles()" class="role-card">
      <div class="role-header">
        <!-- ✅ Material Icon instead of emoji -->
        <span class="role-icon material-icons">{{ getRoleIcon(role.roleName) }}</span>
        <div class="role-info">
          <h3 class="role-name">{{ role.roleName }}</h3>
          <p class="role-description">{{ role.description }}</p>
        </div>
      </div>

      <div class="role-meta">
        <div class="meta-item">
          <svg class="meta-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
          </svg>
          <span>ID: {{ role.roleId }}</span>
        </div>
        <div class="meta-item">
          <svg class="meta-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          <span>{{ role.createdAt | date: 'dd MMM yyyy' }}</span>
        </div>
      </div>

      <div class="role-actions">
        <button 
          class="btn-action btn-permissions"
          (click)="navigateToAssignPermissions(role.roleId)"
          title="Assign Permissions"
        >
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
          Permissions
        </button>
        <button 
          class="btn-action btn-edit"
          (click)="navigateToEdit(role.roleId)"
          title="Edit Role"
        >
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
        </button>
        <button 
          class="btn-action btn-delete"
          (click)="deleteRole(role.roleId, role.roleName)"
          title="Delete Role"
        >
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- No Data State -->
    <div *ngIf="filteredRoles().length === 0" class="no-data-container">
      <svg class="no-data-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
      </svg>
      <p>No roles found</p>
    </div>
  </div>
</div>
